spring.application.name=order-service
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/order_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=0


eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka


#rabbitmq
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

#rabbitmq user defined properties
rabbitmq.queue.name=order_queue
rabbitmq.exchange.name=e_commerce_exchange
rabbitmq.routing.key=order.created


#spring boot actuator
management.health.circuitbreakers.enabled=true
#expose all endpoint
management.endpoints.web.exposure.include=*
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.observations.key-values.application=order-service
management.endpoint.health.show-details=always
management.server.port=8085
management.metrics.enable.all=true

#resilience 4j
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.stock.event-consumer-buffer-size=10
#type of opening and closing mechanism of the circuit breaker, count based mean num of failed requests before opening the circuit breaker
resilience4j.circuitbreaker.instances.stock.sliding-window-type=count_based
#num of failed requests to trigger the circuit breaker
resilience4j.circuitbreaker.instances.stock.sliding-window-size=5
resilience4j.circuitbreaker.instances.stock.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.stock.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.stock.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.stock.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.timelimiter.instances.stock.timeout-duration=2s

resilience4j.retry.instances.stock.max-attempts=3
resilience4j.retry.instances.stock.wait-duration=500ms
resilience4j.retry.instances.stock.retry-exceptions=java.io.IOException, java.util.concurrent.TimeoutException
resilience4j.retry.instances.stock.ignore-exceptions=java.lang.IllegalArgumentException
resilience4j.thread-pool-bulkhead.instances.stock.core-thread-pool-size=2
resilience4j.thread-pool-bulkhead.instances.stock.max-thread-pool-size=3
resilience4j.thread-pool-bulkhead.instances.stock.queue-capacity=3



resilience4j.circuitbreaker.instances.shop.event-consumer-buffer-size=10
#type of opening and closing mechanism of the circuit breaker, count based mean num of failed requests before opening the circuit breaker
resilience4j.circuitbreaker.instances.shop.sliding-window-type=count_based
#num of failed requests to trigger the circuit breaker
resilience4j.circuitbreaker.instances.shop.sliding-window-size=5
resilience4j.circuitbreaker.instances.shop.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.shop.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.shop.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.shop.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.timelimiter.instances.shop.timeout-duration=2s
resilience4j.thread-pool-bulkhead.instances.shop.core-thread-pool-size=3
resilience4j.thread-pool-bulkhead.instances.shop.max-thread-pool-size=5
resilience4j.thread-pool-bulkhead.instances.shop.queue-capacity=10

#Core threads = 3 ? 3 tasks can run immediately.
#
#Queue = 10 ? next 10 tasks wait in the queue.
#
#Max threads = 5 ? if all core threads are busy and queue is full, the pool can grow to 5 threads to handle overflow.

resilience4j.circuitbreaker.instances.product.event-consumer-buffer-size=10
#type of opening and closing mechanism of the circuit breaker, count based mean num of failed requests before opening the circuit breaker
resilience4j.circuitbreaker.instances.product.sliding-window-type=count_based
#num of failed requests to trigger the circuit breaker
resilience4j.circuitbreaker.instances.product.sliding-window-size=5
resilience4j.circuitbreaker.instances.product.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.product.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.product.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.product.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.timelimiter.instances.product.timeout-duration=2s

resilience4j.bulkhead.instances.product.max-concurrent-calls=10

resilience4j.circuitbreaker.instances.customer.event-consumer-buffer-size=10
#type of opening and closing mechanism of the circuit breaker, count based mean num of failed requests before opening the circuit breaker
resilience4j.circuitbreaker.instances.customer.sliding-window-type=count_based
#num of failed requests to trigger the circuit breaker
resilience4j.circuitbreaker.instances.customer.sliding-window-size=5
resilience4j.circuitbreaker.instances.customer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.customer.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.customer.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.customer.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.timelimiter.instances.customer.timeout-duration=2s
