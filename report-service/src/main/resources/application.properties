spring.application.name=report-service
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/report_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=5000
spring.jpa.properties.hibernate.jdbc.order_inserts: true


server.port=9040

eureka.client.serviceUrl.DefaultZone=http://localhost:8761/eureka


#user defined rabbitmq
rabbitmq.queue.name=report_queue
rabbitmq.exchange.name=e_commerce_exchange

