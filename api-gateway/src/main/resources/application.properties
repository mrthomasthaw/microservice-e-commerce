spring.application.name=api-gateway
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka


logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionLocator=INFO
logging.level.org.springframework.cloud.gateway=TRACE


spring.cloud.gateway.server.webmvc.routes[0].id=order-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.server.webmvc.routes[1].id=product-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://product-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/products/**

spring.cloud.gateway.server.webmvc.routes[2].id=customer-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://customer-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/customers

spring.cloud.gateway.server.webmvc.routes[3].id=stock-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://stock-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/stocks/**


spring.cloud.gateway.server.webmvc.routes[4].id=shop-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://shop-service
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/shops/**

spring.cloud.gateway.server.webmvc.routes[5].id=report-service
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://report-service
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/report/**

