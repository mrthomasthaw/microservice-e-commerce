spring.application.name=api-gateway
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka


logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionLocator=INFO
logging.level.org.springframework.cloud.gateway=TRACE


spring.cloud.gateway.server.webmvc.routes[0].id=order-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/order/**

spring.cloud.gateway.server.webmvc.routes[1].id=product-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://product-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/product

spring.cloud.gateway.server.webmvc.routes[2].id=customer-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://customer-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/customer

spring.cloud.gateway.server.webmvc.routes[3].id=stock-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://stock-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/stock/**


